<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horaires de Prières - 80s Multi-Theme</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700&family=Exo+2:ital,wght@0,400;1,700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* THÈME CLAIR : Inspiration Miami Vice / Couleurs Pastel */
            --bg: #f0f0f0;
            --grid-line: rgba(0, 0, 0, 0.05);
            --card: rgba(255, 255, 255, 0.95);
            --accent: #ff71ce; /* Rose Pastel */
            --secondary: #01cdfe; /* Bleu Pastel */
            --text: #2d2d2d;
            --subtle: #b967ff;
            --glass-border: #01cdfe;
            --friday-glow: rgba(1, 205, 254, 0.1);
            --shadow: #ff71ce;
        }

        [data-theme="dark"] {
            /* THÈME SOMBRE : Inspiration Synthwave / Néon */
            --bg: #0d0221;
            --grid-line: rgba(255, 0, 222, 0.15);
            --card: rgba(18, 5, 45, 0.9);
            --accent: #ff00de; /* Rose Néon */
            --secondary: #00f6ff; /* Bleu Cyber */
            --text: #ffffff;
            --subtle: #7a58bf;
            --glass-border: #ff00de;
            --friday-glow: rgba(0, 246, 255, 0.15);
            --shadow: #00f6ff;
        }

        body {
            font-family: 'Exo 2', sans-serif;
            background-color: var(--bg);
            background-image: 
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 40px 40px;
            color: var(--text);
            margin: 0; 
            padding: 100px 10px 40px 10px;
            display: flex; 
            flex-direction: column; 
            align-items: center;
            transition: all 0.4s ease;
        }

        .controls-top {
            position: fixed; top: 20px; right: 20px;
            display: flex; gap: 10px; z-index: 1000;
        }

        .action-btn {
            background: var(--card);
            border: 2px solid var(--secondary); 
            color: var(--text);
            padding: 10px 15px; 
            border-radius: 0;
            cursor: pointer; 
            font-family: 'Press Start 2P', cursive;
            font-size: 0.55rem;
            box-shadow: 4px 4px 0px var(--shadow);
            transition: 0.2s;
        }

        .action-btn:hover { 
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px var(--shadow);
            color: var(--accent);
        }

        .glass-card {
            background: var(--card);
            border: 4px solid var(--secondary);
            box-shadow: 10px 10px 0px var(--accent);
            padding: 35px;
            width: 100%; 
            max-width: 950px;
            position: relative;
            overflow: hidden;
        }

        [data-theme="dark"] .glass-card::before {
            content: " ";
            position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            z-index: 5;
            background-size: 100% 4px;
            pointer-events: none;
        }

        .header-navigation {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }

        .nav-arrow {
            background: var(--accent);
            border: none;
            color: white;
            font-family: 'Press Start 2P', cursive;
            font-size: 1rem;
            cursor: pointer;
            padding: 10px;
            transition: 0.2s;
        }
        .nav-arrow:hover { background: var(--secondary); transform: scale(1.1); }

        h1 { 
            font-family: 'Orbitron', sans-serif; 
            font-size: 2.2rem; 
            text-transform: uppercase;
            font-weight: 900;
            font-style: italic;
            text-align: center;
            letter-spacing: 4px;
            color: var(--text);
            text-shadow: 2px 2px 0px var(--secondary);
        }

        .location-badge { 
            display: block; 
            text-align: center; 
            color: var(--accent); 
            font-family: 'Press Start 2P', cursive;
            font-size: 0.7rem; 
            margin-bottom: 20px;
        }

        .search-container { text-align:center; margin-bottom:30px; }
        input { 
            background: transparent; 
            border: none;
            border-bottom: 3px solid var(--secondary); 
            padding: 10px;
            text-align:center; 
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem; 
            outline:none; 
            width:50%; 
            color: var(--text);
        }

        table { width: 100%; border-collapse: collapse; position: relative; z-index: 10; }
        th { 
            font-family: 'Press Start 2P', cursive;
            font-size: 0.45rem; 
            color: var(--subtle); 
            padding: 15px 5px; 
            border-bottom: 2px solid var(--accent); 
            text-align: center;
        }
        td { 
            padding: 12px 5px; 
            text-align: center; 
            font-size: 0.95rem; 
            font-weight: 700;
            border-bottom: 1px solid rgba(122, 88, 191, 0.2); 
            font-family: 'Orbitron', sans-serif;
        }

        .day-name { 
            font-size: 0.55rem; 
            font-family: 'Press Start 2P', cursive;
            color: var(--secondary); 
            display: block;
            margin-bottom: 5px;
        }

        /* La classe friday-row est utilisée pour le surlignage couleur pastel/néon */
        .friday-row { background: var(--friday-glow); }
        .today-row { 
            background: var(--text) !important; 
            color: var(--bg) !important; 
        }
        .today-row .day-name { color: var(--accent); }

        .col-secondary { color: var(--subtle); font-size: 0.85rem; }

        @media (max-width: 768px) {
            body { padding-top: 80px; }
            .controls-top { right: 10px; top: 10px; }
            .action-btn { padding: 8px 10px; font-size: 0.45rem; }
            
            h1 { font-size: 1.2rem; letter-spacing: 2px; }
            .glass-card { padding: 15px; border-width: 2px; box-shadow: 5px 5px 0px var(--accent); }
            input { width: 80%; font-size: 0.9rem; }

            thead { display: none; } 
            
            tr { 
                display: grid; 
                grid-template-columns: repeat(4, 1fr); 
                grid-template-areas: 
                    "date date date date"
                    "fajr sunrise dhuhr asr"
                    "maghrib isha midnight empty";
                gap: 5px;
                padding: 15px 5px;
                border-bottom: 2px solid var(--grid-line);
            }

            td { 
                display: flex; 
                flex-direction: column; 
                align-items: center; 
                justify-content: center;
                border: none; 
                padding: 5px 2px; 
                font-size: 0.8rem;
            }

            td::before {
                content: attr(data-label);
                font-family: 'Press Start 2P', cursive;
                font-size: 0.35rem;
                color: var(--subtle);
                margin-bottom: 4px;
                text-transform: uppercase;
            }

            td:nth-child(1) { grid-area: date; flex-direction: row; gap: 10px; border-bottom: 1px solid var(--secondary); margin-bottom: 5px; }
            td:nth-child(1)::before { content: ""; } 
            
            td:nth-child(2) { grid-area: fajr; }
            td:nth-child(3) { grid-area: sunrise; }
            td:nth-child(4) { grid-area: dhuhr; }
            td:nth-child(5) { grid-area: asr; }
            td:nth-child(6) { grid-area: maghrib; }
            td:nth-child(7) { grid-area: isha; }
            td:nth-child(8) { grid-area: midnight; }
        }

        @media print {
            @page { 
                size: A4 portrait; 
                margin: 5mm; 
            }
            html, body { 
                height: auto;
                background: white !important; 
                background-image: none !important;
                padding: 0 !important; 
                margin: 0 !important;
                color: black !important;
                overflow: visible !important;
            }
            .glass-card { 
                position: relative;
                width: 100% !important; 
                max-width: none !important;
                margin: 0 !important; 
                padding: 5px !important; 
                border: 1px solid black !important; 
                box-shadow: none !important; 
                background: white !important;
                transform: scale(0.90); 
                transform-origin: top center;
            }
            .glass-card::before { display: none !important; }
            .controls-top, .search-container, .nav-arrow { display: none !important; }
            
            h1 { 
                font-size: 1.3rem !important; 
                text-shadow: none !important; 
                color: black !important;
                margin-top: 2px !important;  
                margin-bottom: 2px !important;
            }
            .location-badge { 
                color: black !important; 
                margin-bottom: 3px !important;
                font-size: 0.6rem !important;
            }
            table { 
                width: 100% !important;
                table-layout: fixed; 
                display: table !important; 
            }
            thead { display: table-header-group !important; }
            tr { display: table-row !important; }
            td { 
                display: table-cell !important;
                padding: 3px 1px !important; 
                font-size: 0.75rem !important; 
                border-bottom: 0.5px solid #ccc !important;
                color: black !important;
            }
            td::before { display: none !important; } 
            
            th { 
                font-size: 0.35rem !important; 
                color: black !important; 
                border-bottom: 1px solid black !important;
                padding: 4px 1px !important; 
            }
            .day-name { 
                color: black !important; 
                font-size: 0.45rem !important;
                margin-bottom: 1px !important;
            }
            
            .weekend-row {
                background-color: #f0f0f0 !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            .today-row { 
                background-color: transparent !important; 
                color: black !important;
            }
            .today-row td, .today-row .day-name { color: black !important; }

            .friday-row { 
                background-color: #f9f9f9 !important; 
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }
    </style>
</head>
<body data-theme="light">

    <div class="controls-top">
        <button class="action-btn" onclick="window.print()">IMPRIMER</button>
        <button class="action-btn" id="theme-btn">CHANGER THÈME</button>
    </div>

    <div class="glass-card">
        <span class="location-badge" id="location-text">CONNEXION...</span>
        
        <div class="header-navigation">
            <button class="nav-arrow" onclick="changeMonth(-1)">&lt;</button>
            <h1 id="titre-mois">CHARGEMENT</h1>
            <button class="nav-arrow" onclick="changeMonth(1)">&gt;</button>
        </div>

        <div class="search-container">
            <input type="text" id="ville-input" placeholder="RECHERCHER UNE VILLE...">
        </div>

        <table>
            <thead>
                <tr>
                    <th style="width: 15%">DATE</th>
                    <th>FAJR</th>
                    <th>LEVÉE</th>
                    <th>DHUHR</th>
                    <th>ASR</th>
                    <th>MAGHRIB</th>
                    <th>ISHA</th>
                    <th>NUIT</th>
                </tr>
            </thead>
            <tbody id="calendrier-body"></tbody>
        </table>
    </div>

    <script>
        const daysFr = ["Dim", "Lun", "Mar", "Mer", "Jeu", "Ven", "Sam"];
        const monthsFr = ["Janvier", "Février", "Mars", "Avril", "Mai", "Juin", "Juillet", "Août", "Septembre", "Octobre", "Novembre", "Décembre"];
        
        let currentYear = new Date().getFullYear();
        let currentMonth = new Date().getMonth() + 1;
        let currentCity = null;
        let currentCoords = { lat: null, lon: null };

        function formatHeure(heureBrute) {
            if(!heureBrute) return "-";
            const heureSeule = heureBrute.split(' ')[0];
            const parties = heureSeule.split(':');
            const h = parseInt(parties[0]);
            const m = parties[1];
            return h + ":" + m;
        }

        function fetchPrayers(lat, lon, city = null) {
            if (city) {
                currentCity = city;
                currentCoords = { lat: null, lon: null };
            } else if (lat && lon) {
                currentCoords = { lat, lon };
                currentCity = null;
            }

            let url = `https://api.aladhan.com/v1/calendar/${currentYear}/${currentMonth}?latitude=${currentCoords.lat}&longitude=${currentCoords.lon}&method=3`;
            if(currentCity) url = `https://api.aladhan.com/v1/calendarByAddress/${currentYear}/${currentMonth}?address=${currentCity}&method=3`;

            fetch(url).then(res => res.json()).then(res => {
                const data = res.data;
                const now = new Date();
                const today = now.getDate();
                const isCurrentMonth = (now.getMonth() + 1 === currentMonth) && (now.getFullYear() === currentYear);

                let html = "";
                data.forEach(day => {
                    const dateParts = day.date.gregorian.date.split('-');
                    const dateObj = new Date(dateParts[2], dateParts[1] - 1, dateParts[0]);
                    const dayIndex = dateObj.getDay();
                    
                    // --- CHANGEMENT ICI ---
                    const isFriday = false; // Suppression du surlignage spécifique au vendredi
                    const isWeekend = (dayIndex === 0 || dayIndex === 6); // Samedi ou Dimanche
                    // ----------------------
                    
                    const isToday = isCurrentMonth && parseInt(day.date.gregorian.day) === today;
                    
                    const maghribStr = day.timings.Maghrib.split(' ')[0];
                    const fajrStr = day.timings.Fajr.split(' ')[0];
                    const [hM, mM] = maghribStr.split(':').map(Number);
                    const [hF, mF] = fajrStr.split(':').map(Number);
                    let magMin = hM * 60 + mM;
                    let fajMin = hF * 60 + mF;
                    if (fajMin < magMin) fajMin += 1440;
                    const dureeNuit = fajMin - magMin;
                    const milieuMinTotal = (magMin + (dureeNuit / 2)) % 1440;
                    const hN = Math.floor(milieuMinTotal / 60);
                    const mN = Math.round(milieuMinTotal % 60);
                    const minuitIslamique = hN + ":" + mN.toString().padStart(2, '0');

                    // --- LOGIQUE DE CLASSE MISE À JOUR ---
                    // Si c'est aujourd'hui, on met le style today. 
                    // Sinon, si c'est le week-end, on applique le surlignage "friday-row".
                    let rowClass = isToday ? "today-row" : (isWeekend ? "friday-row" : "");
                    if(isWeekend) rowClass += " weekend-row";

                    html += `<tr class="${rowClass}">
                        <td><span class="day-name">${daysFr[dayIndex]}</span>${day.date.gregorian.day}</td>
                        <td data-label="Fajr">${formatHeure(day.timings.Fajr)}</td>
                        <td data-label="Levée" class="col-secondary">${formatHeure(day.timings.Sunrise)}</td>
                        <td data-label="Dhuhr">${formatHeure(day.timings.Dhuhr)}</td>
                        <td data-label="Asr">${formatHeure(day.timings.Asr)}</td>
                        <td data-label="Maghrib">${formatHeure(day.timings.Maghrib)}</td>
                        <td data-label="Isha">${formatHeure(day.timings.Isha)}</td>
                        <td data-label="Nuit" class="col-secondary">${minuitIslamique}</td>
                    </tr>`;
                });
                document.getElementById('calendrier-body').innerHTML = html;
                document.getElementById('location-text').innerText = currentCity ? currentCity.toUpperCase() : "MA POSITION";
                document.getElementById('titre-mois').innerText = `${monthsFr[currentMonth - 1]} ${currentYear}`;
            });
        }

        function changeMonth(diff) {
            currentMonth += diff;
            if (currentMonth > 12) {
                currentMonth = 1;
                currentYear++;
            } else if (currentMonth < 1) {
                currentMonth = 12;
                currentYear--;
            }
            fetchPrayers(currentCoords.lat, currentCoords.lon, currentCity);
        }

        function applyTheme(theme) {
            const b = document.body;
            const btn = document.getElementById('theme-btn');
            b.setAttribute('data-theme', theme);
            btn.innerText = (theme === 'dark') ? "MODE CLAIR" : "MODE SOMBRE";
            localStorage.setItem('user-theme', theme);
        }

        document.getElementById('theme-btn').onclick = () => {
            const currentTheme = document.body.getAttribute('data-theme');
            const newTheme = (currentTheme === 'dark') ? 'light' : 'dark';
            applyTheme(newTheme);
        };

        document.getElementById('ville-input').onkeypress = (e) => {
            if(e.key === 'Enter') {
                fetchPrayers(null, null, e.target.value);
            }
        };

        window.onload = () => {
            const savedTheme = localStorage.getItem('user-theme') || 'light';
            applyTheme(savedTheme);
            navigator.geolocation.getCurrentPosition(
                p => fetchPrayers(p.coords.latitude, p.coords.longitude),
                () => fetchPrayers(null, null, "Paris")
            );
        };
    </script>
</body>
</html>
